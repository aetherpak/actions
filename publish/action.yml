name: "AetherPak Publish"
description: "Convert OSTree repository to OCI, push to an OCI registry, generate/merge the registry index, and publish to GitHub Pages."

inputs:
  repo-path:
    description: "Path to the OSTree repository containing the built application (bring your own, or from the build action)."
    required: false
    default: "_repo"
  bundle-path:
    description: "Optional pre-built .flatpak bundle to publish directly; it is imported into repo-path. Lets you publish your own build output without the build action."
    required: false
    default: ""
  app-id:
    description: "Reverse-DNS application ID. Resolved from the repo's ref when empty."
    required: false
    default: ""
  branch:
    description: "Flatpak branch (channel). When empty: the repo ref's branch, else 'stable' on tag pushes, 'beta' on the default branch, or the git ref name."
    required: false
    default: ""
  arch:
    description: "CPU architecture (e.g. x86_64). Resolved from the repo's ref when empty."
    required: false
    default: ""
  registry:
    description: "The registry host (default: ghcr.io)."
    required: false
    default: "ghcr.io"
  insecure-registry:
    description: "Whether to skip TLS verification for the OCI registry (default: false)."
    required: false
    default: "false"
  oci-repository:
    description: "Target registry repository path without host (defaults to GITHUB_REPOSITORY)."
    required: false
    default: ""
  pages-url:
    description: "The final public URL where Pages will serve the index (e.g. https://owner.github.io/repo)."
    required: true
  registry-token:
    description: "Registry auth token for skopeo login (defaults to the GitHub token, used for GHCR). If blank, login is skipped."
    required: false
    default: ${{ github.token }}
  upload-pages-artifact:
    description: "Whether to upload the generated files as a GitHub Pages artifact."
    required: false
    default: "true"
  landing-page:
    description: "Write the static landing page (index.html). Set false to use your own page built from index/static."
    required: false
    default: "true"
  pages-artifact-name:
    description: "The name of the uploaded GitHub Pages artifact."
    required: false
    default: "github-pages"
  site-dir:
    description: "The output directory for the website files."
    required: false
    default: "_site"
  signing:
    description: "Image signing mode: auto (sign iff a key is set), gpg (require a key), or off."
    required: false
    default: "auto"
  gpg-private-key:
    description: "ASCII-armored GPG private key used to sign images. Empty disables signing under 'auto'."
    required: false
    default: ""
  gpg-private-key-passphrase:
    description: "Passphrase for the GPG private key, if it is protected."
    required: false
    default: ""
  sig-dir:
    description: "Site-relative directory for signatures, the public key, and signing.json."
    required: false
    default: "sigs"
  runtime-repo:
    description: "RuntimeRepo URL written into each .flatpakref so one-click installs can fetch the app's runtime. Empty omits it."
    required: false
    default: "https://dl.flathub.org/repo/flathub.flatpakrepo"
  refs-dir:
    description: "Site-relative directory for the generated per-app .flatpakref files."
    required: false
    default: "refs"

outputs:
  signing-path:
    description: "Which signing path ran: 'gpg' when signed, else 'off'."
    value: ${{ steps.signing.outputs.sign == 'true' && 'gpg' || 'off' }}
  public-key-url:
    description: "Public URL of the exported public key, or empty when unsigned."
    value: ${{ steps.signmeta.outputs.public-key-url }}
  signature-lookaside-url:
    description: "Public URL of the signature lookaside directory, or empty when unsigned."
    value: ${{ steps.signmeta.outputs.signature-lookaside-url }}

runs:
  using: "composite"
  steps:
    # Pin the interpreter the scripts run on, independent of the runner's
    # (drifting) system python3. The scripts are pure-stdlib, but this keeps
    # behavior deterministic across runner-image updates.
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: "3.14"

    # skopeo and jq are preinstalled on GitHub runners; install the rest.
    - name: Ensure tooling
      shell: bash
      run: |
        set -euo pipefail
        MISSING=""
        command -v flatpak >/dev/null 2>&1 || MISSING="$MISSING flatpak"
        command -v ostree  >/dev/null 2>&1 || MISSING="$MISSING ostree"
        if [ -n "$MISSING" ] && command -v apt-get >/dev/null 2>&1; then
          export DEBIAN_FRONTEND=noninteractive
          sudo apt-get update && sudo apt-get install -y $MISSING
        fi

    - name: Import bundle (if provided)
      if: ${{ inputs.bundle-path != '' }}
      shell: bash
      run: |
        set -euo pipefail
        echo "Importing bundle ${{ inputs.bundle-path }} into ${{ inputs.repo-path }}..."
        flatpak build-import-bundle "${{ inputs.repo-path }}" "${{ inputs.bundle-path }}"

    - name: Resolve app info
      id: vars
      shell: bash
      env:
        DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
      run: |
        set -euo pipefail
        REPO="${{ inputs.repo-path }}"
        # Artifact upload/download drops empty dirs; restore the refs layout so
        # `ostree refs` works on a repo round-tripped through actions/*-artifact.
        mkdir -p "$REPO/refs/heads" "$REPO/refs/mirrors" "$REPO/refs/remotes"
        REF="$(ostree refs --repo="$REPO" | grep "^app/" | head -n 1 || true)"
        ref_app_id=""; ref_arch=""; ref_branch=""
        if [ -n "$REF" ]; then
          IFS='/' read -r _ ref_app_id ref_arch ref_branch <<< "$REF"
        fi
        # Channel precedence: explicit input > repo ref branch > git-ref default.
        default_channel="$(bash "${{ github.action_path }}/../shared/resolve-channel.sh")"
        app_id="${{ inputs.app-id }}"; [ -n "$app_id" ] || app_id="$ref_app_id"
        arch="${{ inputs.arch }}";     [ -n "$arch" ]   || arch="$ref_arch"
        branch="${{ inputs.branch }}"; [ -n "$branch" ] || branch="${ref_branch:-$default_channel}"
        if [ -z "$app_id" ]; then echo "::error::Could not resolve app-id; pass app-id or provide a repo with an app/* ref."; exit 1; fi
        if [ -z "$arch" ]; then echo "::error::Could not resolve arch; pass arch or provide a repo with an app/* ref."; exit 1; fi
        echo "app-id=$app_id" >> "$GITHUB_OUTPUT"
        echo "arch=$arch" >> "$GITHUB_OUTPUT"
        echo "branch=$branch" >> "$GITHUB_OUTPUT"

    - name: Export app from OSTree repo to OCI image
      shell: bash
      run: |
        set -euo pipefail
        echo "Converting OSTree repository to OCI layout..."
        rm -rf _oci-image
        flatpak build-bundle --oci --arch="${{ steps.vars.outputs.arch }}" \
          "${{ inputs.repo-path }}" _oci-image "${{ steps.vars.outputs.app-id }}" "${{ steps.vars.outputs.branch }}"

    - name: Resolve target and authenticate
      id: target
      shell: bash
      run: |
        set -euo pipefail
        REPO="${{ inputs.oci-repository }}"
        if [ -z "${REPO}" ]; then
          REPO="${GITHUB_REPOSITORY}"
        fi
        REPO="$(echo "${REPO}" | tr '[:upper:]' '[:lower:]')"
        echo "repo=${REPO}" >> "$GITHUB_OUTPUT"
        echo "image=${{ inputs.registry }}/${REPO}" >> "$GITHUB_OUTPUT"

        if [ -n "${{ inputs.registry-token }}" ]; then
          echo "Logging in to ${{ inputs.registry }}..."
          echo "${{ inputs.registry-token }}" | skopeo login "${{ inputs.registry }}" \
            --username "${{ github.actor }}" --password-stdin
        else
          echo "No authentication token provided, skipping login."
        fi

    - name: Prepare signing
      id: signing
      shell: bash
      env:
        GPG_PRIVATE_KEY: ${{ inputs.gpg-private-key }}
      run: |
        set -euo pipefail
        MODE="${{ inputs.signing }}"
        SIG_DIR="${{ inputs.sig-dir }}"
        SITE="${{ inputs.site-dir }}"

        SIGN="false"
        case "$MODE" in
          off) SIGN="false" ;;
          gpg)
            if [ -z "$GPG_PRIVATE_KEY" ]; then
              echo "::error::signing=gpg but gpg-private-key is empty"; exit 1
            fi
            SIGN="true" ;;
          auto)
            [ -n "$GPG_PRIVATE_KEY" ] && SIGN="true" || SIGN="false" ;;
          *) echo "::error::signing must be auto|gpg|off, got '$MODE'"; exit 1 ;;
        esac

        echo "sign=$SIGN" >> "$GITHUB_OUTPUT"
        if [ "$SIGN" != "true" ]; then
          echo "Signing disabled (signing=$MODE)."
          exit 0
        fi

        # Temp GNUPGHOME on the runner; persists to the push step via outputs.
        GNUPGHOME="$(mktemp -d)"; chmod 700 "$GNUPGHOME"; export GNUPGHOME
        printf '%s' "$GPG_PRIVATE_KEY" | gpg --batch --import 2>&1 | sed 's/^/gpg: /'
        FPR="$(gpg --list-secret-keys --with-colons | awk -F: '/^fpr:/{print $10; exit}')"
        if [ -z "$FPR" ]; then echo "::error::no secret key after import"; exit 1; fi

        # Non-interactive signing for passphrase-protected keys.
        echo "allow-loopback-pinentry" > "$GNUPGHOME/gpg-agent.conf"
        echo "pinentry-mode loopback"  > "$GNUPGHOME/gpg.conf"
        gpgconf --kill gpg-agent >/dev/null 2>&1 || true

        # Absolute lookaside dir inside the site (file:// needs an absolute path).
        SIG_DIR_ABS="$(mkdir -p "$SITE/$SIG_DIR" && cd "$SITE/$SIG_DIR" && pwd)"

        REGD="$(mktemp -d)"
        python3 "${{ github.action_path }}/signing.py" registries-d \
          --registry "${{ inputs.registry }}" --lookaside "$SIG_DIR_ABS" \
          > "$REGD/aetherpak.yaml"

        # Export the public key into the site for consumers.
        gpg --armor --export "$FPR" > "$SITE/$SIG_DIR/key.asc"

        echo "fingerprint=$FPR" >> "$GITHUB_OUTPUT"
        echo "gnupghome=$GNUPGHOME" >> "$GITHUB_OUTPUT"
        echo "registries-d=$REGD" >> "$GITHUB_OUTPUT"
        echo "Prepared signing with key $FPR"

    - name: Push OCI image to registry
      shell: bash
      env:
        GPG_PASSPHRASE: ${{ inputs.gpg-private-key-passphrase }}
      run: |
        set -euo pipefail

        TLS_FLAGS=""
        if [ "${{ inputs.insecure-registry }}" = "true" ]; then
          TLS_FLAGS="--src-tls-verify=false --dest-tls-verify=false"
        fi

        REGD_FLAG=""
        SIGN_FLAGS=""
        if [ "${{ steps.signing.outputs.sign }}" = "true" ]; then
          export GNUPGHOME="${{ steps.signing.outputs.gnupghome }}"
          REGD_FLAG="--registries.d ${{ steps.signing.outputs.registries-d }}"
          SIGN_FLAGS="--sign-by ${{ steps.signing.outputs.fingerprint }}"
          if [ -n "$GPG_PASSPHRASE" ]; then
            PASSFILE="$(mktemp)"
            trap 'rm -f "$PASSFILE"' EXIT
            printf '%s' "$GPG_PASSPHRASE" > "$PASSFILE"
            SIGN_FLAGS="$SIGN_FLAGS --sign-passphrase-file $PASSFILE"
          fi
          echo "Signing image with ${{ steps.signing.outputs.fingerprint }}"
        fi

        echo "Pushing OCI image: ${{ steps.target.outputs.image }}:${{ steps.vars.outputs.branch }}-${{ steps.vars.outputs.arch }}..."
        skopeo $REGD_FLAG copy $TLS_FLAGS $SIGN_FLAGS --all \
          oci:_oci-image \
          "docker://${{ steps.target.outputs.image }}:${{ steps.vars.outputs.branch }}-${{ steps.vars.outputs.arch }}"

    - name: Inspect pushed image
      id: inspect
      shell: bash
      run: |
        set -euo pipefail
        echo "Inspecting pushed image..."

        TLS_FLAGS=""
        if [ "${{ inputs.insecure-registry }}" = "true" ]; then
          TLS_FLAGS="--tls-verify=false"
        fi

        OUT="$(skopeo inspect $TLS_FLAGS docker://${{ steps.target.outputs.image }}:${{ steps.vars.outputs.branch }}-${{ steps.vars.outputs.arch }})"
        DIGEST="$(echo "$OUT" | jq -r '.Digest')"

        # Persist the full image label set; flatpak needs org.flatpak.commit/metadata
        # (and sizes/appstream) in the index, not just org.flatpak.ref.
        LABELS_FILE="${RUNNER_TEMP}/aetherpak-oci-labels.json"
        echo "$OUT" | jq '.Labels // {}' > "$LABELS_FILE"
        REFLABEL="$(jq -r '.["org.flatpak.ref"] // empty' "$LABELS_FILE")"

        if [ -z "$DIGEST" ] || [ "$DIGEST" = "null" ]; then
          echo "::error::Could not read manifest digest from pushed image"; exit 1
        fi

        if [ -z "$REFLABEL" ]; then
          echo "::error::org.flatpak.ref label missing on OCI image. The client will not be able to resolve this image."
          exit 1
        fi

        echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"
        echo "reflabel=${REFLABEL}" >> "$GITHUB_OUTPUT"
        echo "labels-file=${LABELS_FILE}" >> "$GITHUB_OUTPUT"

    - name: Write signing metadata
      id: signmeta
      if: ${{ steps.signing.outputs.sign == 'true' }}
      shell: bash
      run: |
        set -euo pipefail
        SITE="${{ inputs.site-dir }}"
        SIG_DIR="${{ inputs.sig-dir }}"

        python3 "${{ github.action_path }}/signing.py" manifest \
          --out "$SITE/$SIG_DIR/signing.json" \
          --sig-dir "$SIG_DIR" \
          --fingerprint "${{ steps.signing.outputs.fingerprint }}" \
          --remote-name aetherpak

        PAGES="${{ inputs.pages-url }}"; PAGES="${PAGES%/}"
        echo "public-key-url=${PAGES}/${SIG_DIR}/key.asc" >> "$GITHUB_OUTPUT"
        echo "signature-lookaside-url=${PAGES}/${SIG_DIR}" >> "$GITHUB_OUTPUT"

        echo "Signature for digest ${{ steps.inspect.outputs.digest }} written under ${SIG_DIR}/"
        ls -R "$SITE/$SIG_DIR"

    - name: Generate Index & Web Files
      shell: bash
      run: |
        set -euo pipefail
        mkdir -p "${{ inputs.site-dir }}/index"

        # Cross-job runs have no local index; seed from the deployed one so we merge.
        if [ ! -f "${{ inputs.site-dir }}/index/static" ] && [ -n "${{ inputs.pages-url }}" ]; then
          PAGES_URL_STRIP="${{ inputs.pages-url }}"
          PAGES_URL_STRIP="${PAGES_URL_STRIP%/}"
          echo "Attempting to fetch existing index from ${PAGES_URL_STRIP}/index/static..."
          EXISTING_INDEX_TEMP="$(mktemp)"
          if curl -s -f -L "${PAGES_URL_STRIP}/index/static" -o "$EXISTING_INDEX_TEMP"; then
            echo "Successfully retrieved existing index from deployed Pages URL."
            cp "$EXISTING_INDEX_TEMP" "${{ inputs.site-dir }}/index/static"
          else
            echo "No existing index found at deployed Pages URL (or site not deployed yet). Starting fresh."
          fi
          rm -f "$EXISTING_INDEX_TEMP"
        fi

        python3 "${{ github.action_path }}/merge_index.py" \
          --index-path "${{ inputs.site-dir }}/index/static" \
          --registry "https://${{ inputs.registry }}" \
          --name "${{ steps.target.outputs.repo }}" \
          --digest "${{ steps.inspect.outputs.digest }}" \
          --ref "${{ steps.inspect.outputs.reflabel }}" \
          --labels-file "${{ steps.inspect.outputs.labels-file }}" \
          --tag "${{ steps.vars.outputs.branch }}" \
          --arch "${{ steps.vars.outputs.arch }}"

        # One repo-level .flatpakrepo configures the remote for every app and channel.
        cat > "${{ inputs.site-dir }}/index.flatpakrepo" <<EOF
        [Flatpak Repo]
        Title=AetherPak (${{ steps.target.outputs.repo }})
        Url=oci+${{ inputs.pages-url }}
        Homepage=${{ inputs.pages-url }}
        Comment=Flatpak repository powered by AetherPak (Pages index + OCI registry blobs)
        EOF

        # Static landing page (reads index/static at runtime); optional.
        if [ "${{ inputs.landing-page }}" = "true" ]; then
          cp "${{ github.action_path }}/index.html" "${{ inputs.site-dir }}/index.html"
        fi

        echo "Generated index/static, index.flatpakrepo, and index.html in ${{ inputs.site-dir }}."
        echo "--- index/static contents ---"
        cat "${{ inputs.site-dir }}/index/static"

    - name: Reconcile index against registry
      shell: bash
      run: |
        set -euo pipefail
        EXTRA=""
        [ "${{ inputs.insecure-registry }}" = "true" ] && EXTRA="--insecure"
        python3 "${{ github.action_path }}/reconcile.py" \
          --index-path "${{ inputs.site-dir }}/index/static" \
          --registry "https://${{ inputs.registry }}" $EXTRA

    - name: Generate per-app .flatpakref files
      shell: bash
      run: |
        set -euo pipefail
        SITE="${{ inputs.site-dir }}"
        REFS_DIR="${{ inputs.refs-dir }}"
        PAGES="${{ inputs.pages-url }}"; PAGES="${PAGES%/}"

        # One-click .flatpakref per installable (app, channel), built from the
        # reconciled index so the set matches the landing page and self-heals.
        EXTRA=()
        if [ "${{ steps.signing.outputs.sign }}" = "true" ]; then
          # GPGKey in a .flatpakref is base64 of the *binary* key; SignatureLookaside
          # makes the one-click install verified (the lookaside key .flatpakrepo lacks).
          export GNUPGHOME="${{ steps.signing.outputs.gnupghome }}"
          KEY_B64_FILE="$(mktemp)"
          gpg --export "${{ steps.signing.outputs.fingerprint }}" | base64 -w0 > "$KEY_B64_FILE"
          EXTRA+=(--gpg-key-base64-file "$KEY_B64_FILE" --signature-lookaside "$PAGES/${{ inputs.sig-dir }}")
        fi

        python3 "${{ github.action_path }}/gen_flatpakrefs.py" \
          --index-path "$SITE/index/static" \
          --out-dir "$SITE/$REFS_DIR" \
          --url "oci+$PAGES" \
          --remote-name aetherpak \
          --runtime-repo "${{ inputs.runtime-repo }}" \
          "${EXTRA[@]}"

        echo "--- generated .flatpakref files ---"
        ls -1 "$SITE/$REFS_DIR" || true

    - name: Backfill signatures from deployed site
      if: ${{ steps.signing.outputs.sign == 'true' }}
      shell: bash
      run: |
        set -euo pipefail
        SITE="${{ inputs.site-dir }}"
        SIG_DIR="${{ inputs.sig-dir }}"
        PAGES="${{ inputs.pages-url }}"; PAGES="${PAGES%/}"
        if [ -z "$PAGES" ]; then echo "No pages-url; skipping signature backfill."; exit 0; fi

        # index/static is cumulative (seeded from the deployed site), but sigs/ is
        # regenerated per run and the Pages deploy replaces the whole site. Without
        # this, prior images' signatures vanish on deploy and verified installs of
        # them break. Backfill any signature the final index references that this
        # run did not just write, fetching it from the deployed site.
        python3 "${{ github.action_path }}/signing.py" sigpaths \
          --index-path "$SITE/index/static" --sig-dir "$SIG_DIR" \
        | while IFS= read -r rel; do
            if [ -z "$rel" ]; then continue; fi
            if [ -f "$SITE/$rel" ]; then continue; fi
            mkdir -p "$SITE/$(dirname "$rel")"
            if curl -fsSL "$PAGES/$rel" -o "$SITE/$rel"; then
              echo "Backfilled signature: $rel"
            else
              rm -f "$SITE/$rel"
              echo "::warning::No deployed signature for $rel (published before signing was enabled, or a different key)."
            fi
          done

    - name: Upload Pages artifact
      if: ${{ inputs.upload-pages-artifact == 'true' }}
      uses: actions/upload-pages-artifact@v5
      with:
        path: ${{ inputs.site-dir }}
        name: ${{ inputs.pages-artifact-name }}
