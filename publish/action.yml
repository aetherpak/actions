name: "AetherPak Publish"
description: "Convert OSTree repository to OCI, push to a registry, generate the index, and publish to GitHub Pages. Thin wrapper over publish-oci + publish-site."

inputs:
  repo-path: { required: false, default: "_repo", description: "OSTree repo path." }
  bundle-path: { required: false, default: "", description: "Pre-built .flatpak bundle to import." }
  app-id: { required: false, default: "", description: "Reverse-DNS app id (resolved when empty)." }
  branch: { required: false, default: "", description: "Flatpak channel." }
  arch: { required: false, default: "", description: "CPU architecture." }
  registry: { required: false, default: "ghcr.io" }
  insecure-registry: { required: false, default: "false" }
  oci-repository: { required: false, default: "" }
  pages-url: { required: true, description: "Public URL the index is served from." }
  registry-token: { required: false, default: "${{ github.token }}" }
  upload-pages-artifact: { required: false, default: "true" }
  landing-page: { required: false, default: "true" }
  pages-artifact-name: { required: false, default: "github-pages" }
  site-dir: { required: false, default: "_site" }
  signing: { required: false, default: "auto" }
  gpg-private-key: { required: false, default: "" }
  gpg-private-key-passphrase: { required: false, default: "" }
  runtime-repo: { required: false, default: "https://dl.flathub.org/repo/flathub.flatpakrepo" }
  remote-name: { required: false, default: "" }
  site-subpath: { required: false, default: "", description: "Optional subdirectory under site-dir to structure the repository files." }

outputs:
  signing-path:
    description: "'gpg' when signed, else 'off'."
    value: ${{ steps.site.outputs.signing-path }}
  public-key-url:
    description: "Public URL of the exported public key, or empty when unsigned."
    value: ${{ steps.site.outputs.public-key-url }}
  signature-lookaside-url:
    description: "Public URL of the signature lookaside directory, or empty when unsigned."
    value: ${{ steps.site.outputs.signature-lookaside-url }}

runs:
  using: "composite"
  steps:
    - name: Push and record
      id: oci
      uses: ./publish-oci
      with:
        repo-path: ${{ inputs.repo-path }}
        bundle-path: ${{ inputs.bundle-path }}
        app-id: ${{ inputs.app-id }}
        branch: ${{ inputs.branch }}
        arch: ${{ inputs.arch }}
        registry: ${{ inputs.registry }}
        insecure-registry: ${{ inputs.insecure-registry }}
        oci-repository: ${{ inputs.oci-repository }}
        registry-token: ${{ inputs.registry-token }}
        signing: ${{ inputs.signing }}
        gpg-private-key: ${{ inputs.gpg-private-key }}
        gpg-private-key-passphrase: ${{ inputs.gpg-private-key-passphrase }}
        records-dir: _records

    - name: Build site from record
      id: site
      uses: ./publish-site
      with:
        records-dir: _records
        pages-url: ${{ inputs.pages-url }}
        site-dir: ${{ inputs.site-dir }}
        insecure-registry: ${{ inputs.insecure-registry }}
        remote-name: ${{ inputs.remote-name }}
        landing-page: ${{ inputs.landing-page }}
        runtime-repo: ${{ inputs.runtime-repo }}
        signing: ${{ inputs.signing }}
        gpg-private-key: ${{ inputs.gpg-private-key }}
        gpg-private-key-passphrase: ${{ inputs.gpg-private-key-passphrase }}
        upload-pages-artifact: ${{ inputs.upload-pages-artifact }}
        pages-artifact-name: ${{ inputs.pages-artifact-name }}
        site-subpath: ${{ inputs.site-subpath }}
