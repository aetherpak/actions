name: "AetherPak Plan"
description: "Expand aetherpak.yaml into a build matrix, narrowed to the apps changed since BASE_SHA."

inputs:
  config:
    description: "Path to the aetherpak.yaml file."
    required: false
    default: "aetherpak.yaml"
  force:
    description: "'' to use change detection, '<app-id>' for a single app, 'all' for everything."
    required: false
    default: ""
  base-sha:
    description: "Commit SHA to diff against. Empty / unknown -> rebuild all."
    required: false
    default: ""
  workflow-path:
    description: "Optional caller workflow path. Touching it forces a full rebuild."
    required: false
    default: ""
  manifest:
    description: "Single Flatpak manifest path (manifest mode; bypasses config)."
    required: false
    default: ""
  arch:
    description: "Manifest mode: space-separated architectures."
    required: false
    default: ""
  branch:
    description: "Manifest mode: Flatpak branch/channel."
    required: false
    default: ""
  run-linter:
    description: "Manifest mode: run flatpak-builder-lint."
    required: false
    default: "true"

outputs:
  apps:
    value: ${{ steps.plan.outputs.apps }}
    description: "JSON list of selected app ids."
  matrix:
    value: ${{ steps.plan.outputs.matrix }}
    description: "Full matrix {include: [...]} of all selected (app, arch) cells."
  matrix-manifest:
    value: ${{ steps.plan.outputs.matrix-manifest }}
    description: "Matrix subset for manifest-source rows."
  matrix-bundle:
    value: ${{ steps.plan.outputs.matrix-bundle }}
    description: "Matrix subset for bundle-source rows."
  count:
    value: ${{ steps.plan.outputs.count }}
    description: "Number of selected apps."
  count-manifest:
    value: ${{ steps.plan.outputs.count-manifest }}
    description: "Number of manifest cells."
  count-bundle:
    value: ${{ steps.plan.outputs.count-bundle }}
    description: "Number of bundle cells."

runs:
  using: "composite"
  steps:
    - name: Require aetherpak CLI
      shell: bash
      run: command -v aetherpak >/dev/null || { echo "::error::aetherpak CLI not on PATH"; exit 1; }
    - name: Compute matrix
      id: plan
      shell: bash
      env:
        CONFIG: ${{ inputs.config }}
        FORCE: ${{ inputs.force }}
        BASE_SHA: ${{ inputs.base-sha }}
        WORKFLOW_PATH: ${{ inputs.workflow-path }}
        MANIFEST: ${{ inputs.manifest }}
        ARCH: ${{ inputs.arch }}
        BRANCH: ${{ inputs.branch }}
        RUN_LINTER: ${{ inputs.run-linter }}
      run: |
        set -euo pipefail
        if [ -n "$MANIFEST" ]; then
          ARGS=(--manifest "$MANIFEST" --run-linter="$RUN_LINTER" --output json --output-file "$GITHUB_OUTPUT")
          [ -n "$BRANCH" ] && ARGS+=(--branch "$BRANCH")
          for a in $ARCH; do ARGS+=(--arch "$a"); done
          aetherpak plan "${ARGS[@]}"
          exit 0
        fi
        ARGS=(--config "$CONFIG" --output json --output-file "$GITHUB_OUTPUT")
        [ -n "$FORCE" ] && ARGS+=(--force "$FORCE")
        [ -n "$BASE_SHA" ] && ARGS+=(--base-sha "$BASE_SHA")
        [ -n "$WORKFLOW_PATH" ] && ARGS+=(--workflow-path "$WORKFLOW_PATH")
        aetherpak plan "${ARGS[@]}"
