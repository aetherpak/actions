name: "AetherPak Publish Site"
description: "Aggregate per-cell records into the static site (index, refs, landing, signatures)."

inputs:
  records-dir:
    description: "Directory holding per-cell record subdirs (one per (app, arch))."
    required: false
    default: "_records"
  pages-url:
    description: "Public URL the index is served from. Required to seed the cumulative index."
    required: true
  site-dir:
    description: "Output directory for the website files."
    required: false
    default: "_site"
  insecure-registry:
    description: "Pass --insecure to reconcile (use only for local test registries)."
    required: false
    default: "false"
  remote-name:
    description: "Flatpak remote name and .flatpakrepo filename. Defaults to '<owner>-<repo>'."
    required: false
    default: ""
  landing-page:
    description: "Write the static landing page (index.html)."
    required: false
    default: "true"
  runtime-repo:
    description: "RuntimeRepo URL written into each .flatpakref."
    required: false
    default: "https://dl.flathub.org/repo/flathub.flatpakrepo"
  repo-title:
    description: "Title for the .flatpakrepo. Empty defers to aetherpak.yaml's repo_title, then the CLI default."
    required: false
    default: ""
  repo-homepage:
    description: "Homepage for the .flatpakrepo. Empty defers to aetherpak.yaml's repo_homepage, then the pages URL."
    required: false
    default: ""
  signing:
    description: "Signing mode: auto (export key iff present), gpg (require), off."
    required: false
    default: "auto"
  gpg-private-key:
    description: "ASCII-armored GPG private key. Used only to export the public material."
    required: false
    default: ""
  gpg-private-key-passphrase:
    description: "Passphrase, if protected."
    required: false
    default: ""
  upload-pages-artifact:
    description: "Whether to upload the generated files as a GitHub Pages artifact."
    required: false
    default: "true"
  pages-artifact-name:
    description: "The name of the uploaded GitHub Pages artifact."
    required: false
    default: "github-pages"

outputs:
  signing-path:
    description: "'gpg' when keys were exported, else 'off'."
    value: ${{ steps.target.outputs.sign == 'true' && 'gpg' || 'off' }}
  public-key-url:
    description: "Public URL of the exported public key, or empty."
    value: ${{ steps.target.outputs.public-key-url }}
  signature-lookaside-url:
    description: "Public URL of the signature lookaside directory, or empty."
    value: ${{ steps.target.outputs.signature-lookaside-url }}

runs:
  using: "composite"
  steps:
    - name: Require aetherpak CLI
      shell: bash
      run: command -v aetherpak >/dev/null || { echo "::error::aetherpak CLI not on PATH"; exit 1; }

    - name: Resolve target and signing gate
      id: target
      shell: bash
      env:
        INPUT_REMOTE_NAME: ${{ inputs.remote-name }}
        MODE: ${{ inputs.signing }}
        KEY: ${{ inputs.gpg-private-key }}
        PAGES_URL: ${{ inputs.pages-url }}
      run: |
        set -euo pipefail
        RNAME="${INPUT_REMOTE_NAME:-$GITHUB_REPOSITORY}"
        RNAME="$(printf '%s' "$RNAME" | tr '[:upper:]' '[:lower:]' | sed 's#[^a-z0-9_-]#-#g')"
        echo "remote-name=$RNAME" >> "$GITHUB_OUTPUT"
        NO_SIGN=false
        ALLOW_UNSIGNED=false
        case "$MODE" in
          off) SIGN=false; NO_SIGN=true ;;
          gpg) [ -n "$KEY" ] || { echo "::error::signing=gpg requires gpg-private-key"; exit 1; }; SIGN=true ;;
          auto) [ -n "$KEY" ] && SIGN=true || { SIGN=false; ALLOW_UNSIGNED=true; } ;;
          *) echo "::error::signing must be auto|gpg|off"; exit 1 ;;
        esac
        echo "sign=$SIGN" >> "$GITHUB_OUTPUT"
        echo "no-sign=$NO_SIGN" >> "$GITHUB_OUTPUT"
        echo "allow-unsigned=$ALLOW_UNSIGNED" >> "$GITHUB_OUTPUT"
        # build-site writes signatures under a fixed "sigs/" directory.
        if [ "$SIGN" = "true" ]; then
          PAGES="${PAGES_URL%/}"
          echo "public-key-url=${PAGES}/sigs/key.asc" >> "$GITHUB_OUTPUT"
          echo "signature-lookaside-url=${PAGES}/sigs" >> "$GITHUB_OUTPUT"
        fi

    - name: Build site
      shell: bash
      env:
        RECORDS_DIR: ${{ inputs.records-dir }}
        PAGES_URL: ${{ inputs.pages-url }}
        SITE_DIR: ${{ inputs.site-dir }}
        INSECURE: ${{ inputs.insecure-registry }}
        REMOTE_NAME: ${{ steps.target.outputs.remote-name }}
        REPO_TITLE: ${{ inputs.repo-title }}
        REPO_HOMEPAGE: ${{ inputs.repo-homepage }}
        RUNTIME_REPO: ${{ inputs.runtime-repo }}
        LANDING: ${{ inputs.landing-page }}
        SIGN: ${{ steps.target.outputs.sign }}
        GPG_KEY: ${{ inputs.gpg-private-key }}
      run: |
        set -euo pipefail
        ARGS=(--records-dir "$RECORDS_DIR" --pages-url "$PAGES_URL" --site-dir "$SITE_DIR"
          --remote-name "$REMOTE_NAME" --runtime-repo "$RUNTIME_REPO" --reconcile)
        [ -n "$REPO_TITLE" ] && ARGS+=(--repo-title "$REPO_TITLE")
        [ -n "$REPO_HOMEPAGE" ] && ARGS+=(--repo-homepage "$REPO_HOMEPAGE")
        [ "$INSECURE" = "true" ] && ARGS+=(--insecure)
        [ "$LANDING" = "true" ] && ARGS+=(--landing-page)
        if [ "$SIGN" = "true" ]; then
          keyfile="$(mktemp)"
          chmod 600 "$keyfile"
          trap 'rm -f "$keyfile"' EXIT
          printf '%s' "$GPG_KEY" > "$keyfile"
          ARGS+=(--gpg-key "$keyfile")
        fi
        [ "${{ steps.target.outputs.no-sign }}" = "true" ] && ARGS+=(--no-sign)
        [ "${{ steps.target.outputs.allow-unsigned }}" = "true" ] && ARGS+=(--allow-unsigned)
        aetherpak build-site "${ARGS[@]}"

    - name: Upload Pages artifact
      if: ${{ inputs.upload-pages-artifact == 'true' }}
      uses: actions/upload-pages-artifact@v5
      with:
        path: ${{ inputs.site-dir }}
        name: ${{ inputs.pages-artifact-name }}
