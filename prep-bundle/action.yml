name: "AetherPak Prep Bundle"
description: "Fetch a .flatpak bundle, verify SHA-256, import into an OSTree repo, and rebind the commit to the consumer-declared channel."

inputs:
  url:
    description: "URL to fetch the bundle from."
    required: true
  sha256:
    description: "Expected SHA-256 of the downloaded bundle."
    required: true
  branch:
    description: "Target channel; the imported app/* ref is rebound to this branch (xa.ref binding rewritten)."
    required: false
    default: "stable"
  repo-path:
    description: "OSTree repo path to write into."
    required: false
    default: "_repo"
  bundle-path:
    description: "Intermediate bundle filename."
    required: false
    default: "bundle.flatpak"

runs:
  using: "composite"
  steps:
    - name: Set up aetherpak CLI if missing
      shell: bash
      id: check-cli
      run: |
        if ! command -v aetherpak >/dev/null; then
          echo "need-setup=true" >> "$GITHUB_OUTPUT"
        else
          echo "need-setup=false" >> "$GITHUB_OUTPUT"
        fi

    - name: Run setup-cli fallback
      if: steps.check-cli.outputs.need-setup == 'true'
      uses: aetherpak/setup-cli@v1

    - name: Fetch, verify, import, and rebind
      shell: bash
      env:
        URL: ${{ inputs.url }}
        SHA: ${{ inputs.sha256 }}
        BRANCH: ${{ inputs.branch }}
        REPO: ${{ inputs.repo-path }}
      run: |
        set -euo pipefail
        aetherpak import \
          --bundle-url "$URL" \
          --bundle-sha256 "$SHA" \
          --branch "$BRANCH" \
          --repo-path "$REPO"
