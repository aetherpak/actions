name: "AetherPak Prep Bundle"
description: "Fetch a .flatpak bundle, verify SHA-256, import into an OSTree repo, and rebind the commit to the consumer-declared channel."

inputs:
  url:
    description: "URL to fetch the bundle from."
    required: true
  sha256:
    description: "Expected SHA-256 of the downloaded bundle."
    required: true
  branch:
    description: "Target channel; the imported app/* ref is rebound to this branch (xa.ref binding rewritten)."
    required: false
    default: "stable"
  repo-path:
    description: "OSTree repo path to write into."
    required: false
    default: "_repo"
  bundle-path:
    description: "Intermediate bundle filename."
    required: false
    default: "bundle.flatpak"

runs:
  using: "composite"
  steps:
    - name: Ensure tooling
      shell: bash
      run: |
        set -euo pipefail
        MISSING=""
        command -v flatpak >/dev/null 2>&1 || MISSING="$MISSING flatpak"
        command -v ostree  >/dev/null 2>&1 || MISSING="$MISSING ostree"
        if [ -n "$MISSING" ] && command -v apt-get >/dev/null 2>&1; then
          export DEBIAN_FRONTEND=noninteractive
          sudo apt-get update && sudo apt-get install -y $MISSING
        fi

    - name: Fetch + verify
      shell: bash
      env:
        URL: ${{ inputs.url }}
        SHA: ${{ inputs.sha256 }}
        BUNDLE: ${{ inputs.bundle-path }}
      run: |
        set -euo pipefail
        curl -fL --retry 3 -o "$BUNDLE" "$URL"
        echo "$SHA  $BUNDLE" | sha256sum -c -

    - name: Import + rebind
      shell: bash
      env:
        REPO: ${{ inputs.repo-path }}
        BUNDLE: ${{ inputs.bundle-path }}
        TARGET_BRANCH: ${{ inputs.branch }}
      run: |
        set -euo pipefail

        # build-commit-from rewrites the commit's xa.ref binding; a bare
        # `ostree refs --create` leaves the binding on the source branch and
        # flatpak verification rejects the deployed ref as a mismatch.
        SCRATCH="$(mktemp -d)"
        trap 'rm -rf "$SCRATCH"' EXIT
        ostree --repo="$SCRATCH" init --mode=archive-z2
        flatpak build-import-bundle "$SCRATCH" "$BUNDLE"

        SRC_REF="$(ostree --repo="$SCRATCH" refs | grep '^app/' | head -1 || true)"
        [ -n "$SRC_REF" ] || { echo "::error::no app/* ref in imported bundle"; exit 1; }
        IFS='/' read -r _ app_id arch src_branch <<< "$SRC_REF"
        target_ref="app/$app_id/$arch/$TARGET_BRANCH"

        mkdir -p "$REPO"
        [ -f "$REPO/config" ] || ostree --repo="$REPO" init --mode=archive-z2

        if [ "$src_branch" != "$TARGET_BRANCH" ]; then
          echo "::notice::Rebinding bundle branch '$src_branch' -> '$TARGET_BRANCH'"
        fi
        flatpak build-commit-from \
          --src-repo="$SCRATCH" \
          --src-ref="$SRC_REF" \
          --update-appstream \
          --no-update-summary \
          "$REPO" "$target_ref"
