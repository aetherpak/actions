name: Build & Publish Flatpak Repository
on:
  workflow_call:
    inputs:
      manifest-path:
        description: "Path to the Flatpak manifest."
        required: true
        type: string
      runtime:
        description: "flathub container tag (e.g. gnome-50, freedesktop-24.08)."
        required: true
        type: string
      arches:
        description: "Space-separated subset of: x86_64 aarch64."
        required: false
        type: string
        default: "x86_64 aarch64"
      branch:
        description: "Flatpak branch (channel). When unset: 'stable' on tag pushes, 'beta' on the default branch, else the git ref name."
        required: false
        type: string
        default: ""
      run-linter:
        required: false
        type: boolean
        default: true
      deploy:
        description: "Deploy to GitHub Pages. Set false to host elsewhere."
        required: false
        type: boolean
        default: true
      registry:
        required: false
        type: string
        default: "ghcr.io"
      oci-repository:
        required: false
        type: string
        default: ""
      remote-name:
        description: "Flatpak remote name (and the .flatpakrepo filename). Defaults to the GitHub repo slug '<owner>-<repo>'; override for a friendlier name."
        required: false
        type: string
        default: ""
      pages-url:
        description: "Public URL the index is served from. Defaults to the project's Pages URL; set to your custom domain if you use one."
        required: false
        type: string
        default: ""
      cache:
        required: false
        type: boolean
        default: true
      landing-page:
        description: "Write the static landing page (index.html)."
        required: false
        type: boolean
        default: true
      signing:
        description: "Image signing mode: auto, gpg, or off. Signs only when the gpg-private-key secret is set."
        required: false
        type: string
        default: "auto"
      runtime-repo:
        description: "RuntimeRepo URL written into each one-click .flatpakref so the app's runtime can auto-install. Empty omits it."
        required: false
        type: string
        default: "https://dl.flathub.org/repo/flathub.flatpakrepo"
      artifact-name:
        description: "Name of the uploaded site artifact when deploy is false."
        required: false
        type: string
        default: aetherpak-site
      concurrency-group:
        description: "Override the lock that serializes publishes to one shared index. Defaults to one group per repository; set this only if a repo publishes to several independent sites."
        required: false
        type: string
        default: ""
      submodules:
        description: "Submodule fetch mode for actions/checkout. Accepts 'recursive' (default), 'true', or 'false'. Repos that vendor their flatpak sources as submodules need this; setting 'false' is a no-op on repos without submodules."
        required: false
        type: string
        default: "recursive"
      reconcile-only:
        description: "Skip build/publish-oci; only reconcile the index against the registry and re-deploy. Use after deleting an image from GHCR."
        required: false
        type: boolean
        default: false
      cli-version:
        description: "aetherpak CLI release tag to install (e.g. v0.6.0), or 'latest'."
        required: false
        type: string
        default: "v0.6.0"
      builder-args:
        description: "Extra flatpak-builder flags for the manifest build, one per line. Defaults to installing manifest deps from flathub."
        required: false
        type: string
        default: "--install-deps-from=flathub"
    outputs:
      pages-url:
        description: "URL the index and .flatpakrepo are written against."
        value: ${{ jobs.prep.outputs.pages-url }}
    secrets:
      gpg-private-key:
        description: "ASCII-armored GPG private key. When set (and signing != off), images are signed."
        required: false
      gpg-private-key-passphrase:
        description: "Passphrase for the GPG private key, if protected."
        required: false

jobs:
  prep:
    name: "AetherPak: Prepare"
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.m.outputs.matrix }}
      pages-url: ${{ steps.m.outputs.pages-url }}
      actions-ref: ${{ steps.aref.outputs.ref }}
    steps:
      - name: Resolve architectures & Pages URL
        id: m
        shell: bash
        env:
          ARCHES: ${{ inputs.arches }}
          PAGES_URL: ${{ inputs.pages-url }}
          DEFAULT_PAGES_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}
        run: |
          set -euo pipefail
          include="[]"
          for a in $ARCHES; do
            case "$a" in
              x86_64)  include="$(jq -c '. + [{"arch":"x86_64","runner":"ubuntu-latest"}]' <<< "$include")";;
              aarch64) include="$(jq -c '. + [{"arch":"aarch64","runner":"ubuntu-24.04-arm"}]' <<< "$include")";;
              *) echo "::error::Unsupported arch '$a' (only x86_64, aarch64 are available in the flathub container)."; exit 1;;
            esac
          done
          echo "matrix={\"include\":$include}" >> "$GITHUB_OUTPUT"
          url="$PAGES_URL"; [ -n "$url" ] || url="$DEFAULT_PAGES_URL"
          echo "pages-url=$url" >> "$GITHUB_OUTPUT"
      - name: Resolve actions ref
        id: aref
        env:
          JWR: ${{ github.job_workflow_ref }}
        run: |
          set -euo pipefail
          ref="${JWR##*@}"
          echo "ref=${ref}" >> "$GITHUB_OUTPUT"

  build:
    name: "AetherPak: Build (${{ matrix.arch }})"
    needs: prep
    if: ${{ !inputs.reconcile-only }}
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix: ${{ fromJSON(needs.prep.outputs.matrix) }}
    permissions:
      contents: read
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:${{ inputs.runtime }}
      options: --privileged
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          submodules: ${{ inputs.submodules }}
      - name: Check out actions repo
        uses: actions/checkout@v6
        with:
          repository: aetherpak/actions
          ref: ${{ needs.prep.outputs.actions-ref }}
          path: .github/actions/aetherpak
      - name: Set up aetherpak CLI
        uses: aetherpak/setup-cli@v1
        with:
          version: ${{ inputs.cli-version }}
      - name: Build Flatpak from manifest
        uses: ./.github/actions/aetherpak/build
        with:
          manifest-path: ${{ inputs.manifest-path }}
          arch: ${{ matrix.arch }}
          branch: ${{ inputs.branch }}
          repo-path: _repo_${{ matrix.arch }}
          run-linter: ${{ inputs.run-linter }}
          cache: ${{ inputs.cache }}
          builder-args: ${{ inputs.builder-args }}
      - name: Upload OSTree repository
        uses: actions/upload-artifact@v7
        with:
          name: repo-${{ matrix.arch }}
          path: _repo_${{ matrix.arch }}

  publish-oci:
    name: "AetherPak: Push (${{ matrix.arch }})"
    needs: [prep, build]
    if: ${{ !inputs.reconcile-only }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prep.outputs.matrix) }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          submodules: ${{ inputs.submodules }}
      - name: Check out actions repo
        uses: actions/checkout@v6
        with:
          repository: aetherpak/actions
          ref: ${{ needs.prep.outputs.actions-ref }}
          path: .github/actions/aetherpak
      - name: Set up aetherpak CLI
        uses: aetherpak/setup-cli@v1
        with:
          version: ${{ inputs.cli-version }}
      - name: Download OSTree repository
        uses: actions/download-artifact@v8
        with:
          name: repo-${{ matrix.arch }}
          path: _repo_${{ matrix.arch }}
      - name: Push OCI image
        uses: ./.github/actions/aetherpak/publish-oci
        with:
          repo-path: _repo_${{ matrix.arch }}
          arch: ${{ matrix.arch }}
          branch: ${{ inputs.branch }}
          registry: ${{ inputs.registry }}
          oci-repository: ${{ inputs.oci-repository }}
          signing: ${{ inputs.signing }}
          gpg-private-key: ${{ secrets.gpg-private-key }}
          gpg-private-key-passphrase: ${{ secrets.gpg-private-key-passphrase }}
          records-dir: _records
      - name: Upload record
        uses: actions/upload-artifact@v7
        with:
          name: aetherpak-record-${{ matrix.arch }}
          path: _records
          include-hidden-files: true
          retention-days: 1

  publish-site:
    name: "AetherPak: Publish Site & Deploy"
    needs: [prep, publish-oci]
    if: ${{ !cancelled() && !failure() }}
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ inputs.concurrency-group != '' && inputs.concurrency-group || format('aetherpak-publish-{0}', github.repository) }}
      cancel-in-progress: false
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: ${{ inputs.deploy && 'github-pages' || '' }}
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Check out actions repo
        uses: actions/checkout@v6
        with:
          repository: aetherpak/actions
          ref: ${{ needs.prep.outputs.actions-ref }}
          path: .github/actions/aetherpak
      - name: Set up aetherpak CLI
        uses: aetherpak/setup-cli@v1
        with:
          version: ${{ inputs.cli-version }}
      - name: Download records
        if: ${{ !inputs.reconcile-only }}
        # merge-multiple lands all cells under one `_records/` regardless of how
        # many arches matched — download-artifact@v8 otherwise drops the
        # artifact-name subdir when only one artifact matches the pattern.
        uses: actions/download-artifact@v8
        with:
          pattern: aetherpak-record-*
          path: _records
          merge-multiple: true
      - name: Build site
        uses: ./.github/actions/aetherpak/publish-site
        with:
          records-dir: _records
          pages-url: ${{ needs.prep.outputs.pages-url }}
          remote-name: ${{ inputs.remote-name }}
          landing-page: ${{ inputs.landing-page }}
          signing: ${{ inputs.signing }}
          runtime-repo: ${{ inputs.runtime-repo }}
          gpg-private-key: ${{ secrets.gpg-private-key }}
          gpg-private-key-passphrase: ${{ secrets.gpg-private-key-passphrase }}
          upload-pages-artifact: ${{ inputs.deploy }}
      - name: Deploy to GitHub Pages
        id: deploy
        if: ${{ inputs.deploy }}
        uses: actions/deploy-pages@v5
      - name: Upload site artifact
        if: ${{ !inputs.deploy }}
        uses: actions/upload-artifact@v7
        with:
          name: ${{ inputs.artifact-name }}
          path: _site
