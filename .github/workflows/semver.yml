name: Check SemVer Tags

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  semver:
    name: Verify version tags & releases
    runs-on: ubuntu-latest
    steps:
      - uses: actions/create-github-app-token@v3
        id: app-token
        with:
          app-id: ${{ vars.AETHERPAK_ACTION_BOT_APP_ID }}
          private-key: ${{ secrets.AETHERPAK_ACTION_BOT_APP_PRIVATE_KEY }}
      - uses: jessehouwing/actions-semver-checker@v2
        with:
          auto-fix: true
          token: ${{ steps.app-token.outputs.token }}
