name: Check SemVer Tags

on:
  release:
    types: [published]
  workflow_dispatch:

permissions: {}

jobs:
  semver:
    name: Verify version tags & releases
    runs-on: ubuntu-latest
    steps:
      - uses: actions/create-github-app-token@v3
        id: app-token
        with:
          app-id: ${{ vars.AETHERPAK_ACTION_BOT_APP_ID }}
          private-key: ${{ secrets.AETHERPAK_ACTION_BOT_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}
          permission-contents: write
          permission-workflows: write
          permission-metadata: read
      - name: Wait for Marketplace to index release
        if: github.event_name == 'release'
        env:
          TAG: ${{ github.event.release.tag_name }}
          SLUG: aetherpak-flatpak-registry-publisher
        run: |
          url="https://github.com/marketplace/actions/${SLUG}?version=${TAG}"
          deadline=$((SECONDS + 300))
          attempt=0
          while (( SECONDS < deadline )); do
            attempt=$((attempt + 1))
            if curl -fsSL "$url" 2>/dev/null | grep -Fq ">${TAG}<"; then
              echo "Marketplace serves ${TAG} (attempt ${attempt})"
              exit 0
            fi
            echo "Marketplace not yet serving ${TAG} (attempt ${attempt})"
            sleep 10
          done
          echo "::warning::Marketplace did not surface ${TAG} within 5 min; running checker anyway"
      - uses: jessehouwing/actions-semver-checker@v2
        with:
          auto-fix: true
          token: ${{ steps.app-token.outputs.token }}
