name: Deploy Landing Page
on:
  push:
    branches: [main]
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: true
jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6
      - name: Pin usage examples to this commit
        run: sed -i "s/__COMMIT_SHA__/${GITHUB_SHA}/g" docs/site/index.html
      - uses: actions/upload-pages-artifact@v5
        with:
          path: docs/site
      - id: deploy
        uses: actions/deploy-pages@v5
