name: Test Actions

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    name: Lint (pre-commit)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
      - name: Run pre-commit
        uses: pre-commit/action@v3.0.1

  integration-test:
    name: Mock Integration Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Set up aetherpak CLI
        uses: aetherpak/setup-cli@v1
        with:
          version: v0.5.0

      - name: Start Local OCI Registry
        run: |
          docker run -d -p 5001:5000 --name registry registry:2
          for _ in {1..10}; do
            curl -s http://localhost:5001/v2/ && break
            sleep 1
          done
      - name: Create Mock OSTree Repository
        run: |
          mkdir -p tests/mock_repo
          ostree init --mode=archive --repo=tests/mock_repo
          mkdir -p tests/mock_contents
          cat > tests/mock_contents/metadata <<EOF
          [Application]
          name=org.flatpak.MockApp
          runtime=org.freedesktop.Platform/x86_64/23.08
          sdk=org.freedesktop.Sdk/x86_64/23.08
          EOF
          ostree commit --repo=tests/mock_repo --branch=app/org.flatpak.MockApp/x86_64/stable -m "mock app commit" tests/mock_contents

      - name: Run Build Action
        id: build_step
        uses: ./build
        with:
          prebuilt-repo-path: tests/mock_repo
          repo-path: _repo_test
          run-linter: "false"

      - name: Verify Build Action Outputs
        run: |
          if [ "${{ steps.build_step.outputs.app-id }}" != "org.flatpak.MockApp" ]; then
            echo "Error: app-id output is wrong"
            exit 1
          fi
          if [ "${{ steps.build_step.outputs.branch }}" != "stable" ]; then
            echo "Error: branch output is wrong"
            exit 1
          fi
          if [ "${{ steps.build_step.outputs.arch }}" != "x86_64" ]; then
            echo "Error: arch output is wrong"
            exit 1
          fi
      - name: Run Publish Action
        id: publish_step
        uses: ./publish
        with:
          repo-path: ${{ steps.build_step.outputs.repo-path }}
          registry: "localhost:5001"
          insecure-registry: "true"
          oci-repository: "aetherpak/mock-app"
          remote-name: "aetherpak-test"
          pages-url: "http://localhost:9999"
          registry-token: "" # skip login for local registry
          upload-pages-artifact: "false"

      - name: Verify Generated Index
        run: |
          if [ ! -f "_site/index/static" ]; then
            echo "Error: index/static not generated"
            exit 1
          fi
          if [ ! -f "_site/aetherpak-test.flatpakrepo" ]; then
            echo "Error: flatpakrepo file not generated"
            exit 1
          fi
          # Unsigned: the repo file must NOT carry a key (the verified path is opt-in).
          if grep -q '^GPGKey=' "_site/aetherpak-test.flatpakrepo"; then
            echo "Error: unsigned .flatpakrepo unexpectedly contains GPGKey"
            exit 1
          fi
          # The headline one-click install: a per-app .flatpakref under refs/.
          if [ ! -f "_site/refs/org.flatpak.MockApp-stable.flatpakref" ]; then
            echo "Error: per-app .flatpakref not generated"
            exit 1
          fi

          # Check index contents (Registry must be a plain URL, not oci+ prefixed)
          REGISTRY_URL="$(jq -r '.Registry' _site/index/static)"
          if [ "$REGISTRY_URL" != "http://localhost:5001" ]; then
            echo "Error: Registry URL in index is wrong: $REGISTRY_URL"
            exit 1
          fi

          NAME="$(jq -r '.Results[0].Name' _site/index/static)"
          if [ "$NAME" != "aetherpak/mock-app" ]; then
            echo "Error: Result Name in index is wrong: $NAME"
            exit 1
          fi

          REF="$(jq -r '.Results[0].Images[0].Labels["org.flatpak.ref"]' _site/index/static)"
          if [ "$REF" != "app/org.flatpak.MockApp/x86_64/stable" ]; then
            echo "Error: Image Ref Label in index is wrong: $REF"
            exit 1
          fi

          # flatpak needs the full label set in the index, not just the ref
          for label in org.flatpak.commit org.flatpak.metadata; do
            VAL="$(jq -r --arg l "$label" '.Results[0].Images[0].Labels[$l] // empty' _site/index/static)"
            if [ -z "$VAL" ]; then
              echo "Error: required label $label missing from index"
              exit 1
            fi
          done

          echo "All checks passed! Integration test successful!"

          # Unsigned default: signing.json marks signing disabled, with no
          # exported key or signatures, and the action reports the off path.
          if [ "$(jq -r '.enabled' _site/sigs/signing.json)" != "false" ]; then
            echo "Error: unsigned signing.json should report enabled=false"; exit 1
          fi
          if [ -f "_site/sigs/key.asc" ]; then
            echo "Error: unsigned publish unexpectedly exported a public key"; exit 1
          fi
          if find _site/sigs -type f -name 'signature-*' | grep -q .; then
            echo "Error: unsigned publish unexpectedly produced signatures"; exit 1
          fi
          if [ "${{ steps.publish_step.outputs.signing-path }}" != "off" ]; then
            echo "Error: unsigned publish should report signing-path=off"; exit 1
          fi

      - name: Reconcile drops missing entries, keeps present
        run: |
          set -euo pipefail
          # Inject a ghost whose image is absent from the registry, serve the
          # index over the pages URL, then rebuild: reconcile must drop the
          # ghost and keep the real app.
          ghost="sha256:$(printf '0%.0s' $(seq 64))"
          jq --arg d "$ghost" '.Results += [{"Name":"aetherpak/ghost","Images":[{"Digest":$d,"Architecture":"amd64","Labels":{"org.flatpak.ref":"app/org.flatpak.Ghost/x86_64/stable"},"Tags":["stable"]}]}]' \
            _site/index/static > _site/index/static.new
          mv _site/index/static.new _site/index/static

          python3 -m http.server 9999 --directory _site & srv=$!
          sleep 1
          aetherpak build-site --records-dir _records --site-dir _site_rec \
            --pages-url http://localhost:9999 --insecure --reconcile \
            --remote-name aetherpak-test
          kill "$srv" || true

          names="$(jq -r '.Results[].Name' _site_rec/index/static)"
          echo "$names" | grep -qx 'aetherpak/mock-app' || { echo "mock-app should remain: $names"; exit 1; }
          if echo "$names" | grep -qx 'aetherpak/ghost'; then echo "ghost should be reconciled away: $names"; exit 1; fi
          echo "reconcile integration ok"

  signing-integration-test:
    name: Mock Signing Integration Test (auto activation)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Set up aetherpak CLI
        uses: aetherpak/setup-cli@v1
        with:
          version: v0.5.0

      - name: Start Local OCI Registry
        run: |
          docker run -d -p 5001:5000 --name registry registry:2
          for _ in {1..10}; do curl -s http://localhost:5001/v2/ && break; sleep 1; done

      - name: Create Mock OSTree Repository
        run: |
          mkdir -p tests/mock_repo
          ostree init --mode=archive --repo=tests/mock_repo
          mkdir -p tests/mock_contents
          cat > tests/mock_contents/metadata <<EOF
          [Application]
          name=org.flatpak.MockApp
          runtime=org.freedesktop.Platform/x86_64/23.08
          sdk=org.freedesktop.Sdk/x86_64/23.08
          EOF
          ostree commit --repo=tests/mock_repo --branch=app/org.flatpak.MockApp/x86_64/stable -m "mock app commit" tests/mock_contents

      - name: Generate ephemeral signing key
        run: |
          set -euo pipefail
          GNUPGHOME="$(mktemp -d)"; export GNUPGHOME
          cat > "$GNUPGHOME/params" <<EOF
          %no-protection
          Key-Type: RSA
          Key-Length: 2048
          Name-Real: AetherPak CI
          Name-Email: ci@aetherpak.local
          Expire-Date: 0
          %commit
          EOF
          gpg --batch --gen-key "$GNUPGHOME/params"
          { echo "AEP_GPG_KEY<<EOF"; gpg --armor --export-secret-keys; echo "EOF"; } >> "$GITHUB_ENV"

      - name: Run Build Action
        id: build_step
        uses: ./build
        with:
          prebuilt-repo-path: tests/mock_repo
          repo-path: _repo_test
          run-linter: "false"

      - name: Run Publish Action (key present, default mode)
        id: signed_publish
        uses: ./publish
        with:
          repo-path: ${{ steps.build_step.outputs.repo-path }}
          registry: "localhost:5001"
          insecure-registry: "true"
          oci-repository: "aetherpak/mock-app"
          remote-name: "aetherpak-test"
          pages-url: "http://localhost:9999"
          registry-token: ""
          upload-pages-artifact: "false"
          # NOTE: no `signing:` here — default is `auto`, so the key alone enables it.
          gpg-private-key: ${{ env.AEP_GPG_KEY }}

      # setup-cli installs flatpak/ostree/gpg but not skopeo, which this job
      # uses to verify the detached signature.
      - name: Install skopeo
        run: sudo apt-get update && sudo apt-get install -y skopeo

      - name: Verify auto-activation, signature, key, and metadata
        run: |
          set -euo pipefail
          # Auto-activation: a key under the default mode must select the gpg path.
          test "${{ steps.signed_publish.outputs.signing-path }}" = "gpg" \
            || { echo "auto mode with a key should report signing-path=gpg"; exit 1; }

          REF="localhost:5001/aetherpak/mock-app:org_flatpak_MockApp-stable-x86_64"
          DIGEST="$(jq -r '.Results[0].Images[0].Digest' _site/index/static)"
          SIG="_site/sigs/aetherpak/mock-app@${DIGEST/:/=}/signature-1"

          test -f "$SIG"               || { echo "missing signature: $SIG"; exit 1; }
          test -f "_site/sigs/key.asc" || { echo "missing key.asc"; exit 1; }
          test -f "_site/sigs/signing.json" || { echo "missing signing.json"; exit 1; }

          ENABLED="$(jq -r '.enabled' _site/sigs/signing.json)"
          test "$ENABLED" = "true" || { echo "signing.json not enabled"; exit 1; }

          # Signed: the .flatpakrepo embeds the public key (so adding the remote needs
          # no key fetch). Verify it carries GPGKey and that it equals key.asc.
          REPO_FILE="_site/aetherpak-test.flatpakrepo"
          test -f "$REPO_FILE" || { echo "missing $REPO_FILE"; exit 1; }
          grep -q '^GPGKey=' "$REPO_FILE" || { echo "signed .flatpakrepo missing GPGKey"; exit 1; }
          grep '^GPGKey=' "$REPO_FILE" | sed 's/^GPGKey=//' | base64 -d > /tmp/embedded.gpg
          gpg --dearmor < _site/sigs/key.asc > /tmp/keyasc.gpg
          cmp -s /tmp/embedded.gpg /tmp/keyasc.gpg || { echo "embedded GPGKey != key.asc"; exit 1; }

          # Verify the signed image manifest, addressed by digest: the tag
          # resolves to the OCI index, whose digest differs from the signed one.
          skopeo inspect --raw --tls-verify=false \
            "docker://localhost:5001/aetherpak/mock-app@$DIGEST" > manifest.json
          skopeo standalone-verify manifest.json "$REF" any "$SIG" \
            --public-key-file _site/sigs/key.asc

          echo "Signing integration test successful!"

  signing-gate-test:
    name: Mock Signing Gate (gpg requires a key)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Set up aetherpak CLI
        uses: aetherpak/setup-cli@v1
        with:
          version: v0.5.0

      - name: Create Mock OSTree Repository
        run: |
          mkdir -p tests/mock_repo
          ostree init --mode=archive --repo=tests/mock_repo
          mkdir -p tests/mock_contents
          cat > tests/mock_contents/metadata <<EOF
          [Application]
          name=org.flatpak.MockApp
          runtime=org.freedesktop.Platform/x86_64/23.08
          sdk=org.freedesktop.Sdk/x86_64/23.08
          EOF
          ostree commit --repo=tests/mock_repo --branch=app/org.flatpak.MockApp/x86_64/stable -m "mock app commit" tests/mock_contents

      - name: Run Build Action
        id: build_step
        uses: ./build
        with:
          prebuilt-repo-path: tests/mock_repo
          repo-path: _repo_test
          run-linter: "false"

      - name: Publish with signing=gpg but no key (must fail)
        id: gate
        continue-on-error: true
        uses: ./publish
        with:
          repo-path: ${{ steps.build_step.outputs.repo-path }}
          registry: "localhost:5001"
          insecure-registry: "true"
          oci-repository: "aetherpak/mock-app"
          pages-url: "http://localhost:9999"
          registry-token: ""
          upload-pages-artifact: "false"
          signing: "gpg"

      - name: Assert it failed
        run: |
          if [ "${{ steps.gate.outcome }}" != "failure" ]; then
            echo "Error: signing=gpg without a key must fail"; exit 1
          fi
          echo "gpg gate correctly rejected an empty key"

  bundle-integration-test:
    name: Mock Bundle Source Integration Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Set up aetherpak CLI
        uses: aetherpak/setup-cli@v1
        with:
          version: v0.5.0

      - name: Start Local OCI Registry
        run: |
          docker run -d -p 5001:5000 --name registry registry:2
          for _ in {1..10}; do curl -s http://localhost:5001/v2/ && break; sleep 1; done

      - name: Build a one-off mock bundle
        # Build a real .flatpak bundle in a throwaway repo, then discard the
        # repo so publish has to init its own from the bundle alone: the
        # scenario where no pre-existing repo-path exists.
        run: |
          set -euo pipefail
          mkdir -p tests/bundle_src
          ostree init --mode=archive --repo=tests/bundle_src
          mkdir -p tests/bundle_contents/files tests/bundle_contents/export
          cat > tests/bundle_contents/metadata <<EOF
          [Application]
          name=org.flatpak.BundleApp
          runtime=org.freedesktop.Platform/x86_64/23.08
          sdk=org.freedesktop.Sdk/x86_64/23.08
          EOF
          ostree commit --repo=tests/bundle_src \
            --branch=app/org.flatpak.BundleApp/x86_64/stable \
            -m "mock bundle commit" tests/bundle_contents
          flatpak build-bundle tests/bundle_src tests/mock.flatpak \
            org.flatpak.BundleApp stable

      - name: Publish from bundle (no pre-existing repo-path)
        id: publish_step
        uses: ./publish
        with:
          # `repo-path` must NOT exist — that's the consumer scenario.
          repo-path: _repo_from_bundle
          bundle-path: tests/mock.flatpak
          registry: "localhost:5001"
          insecure-registry: "true"
          oci-repository: "aetherpak/bundle-app"
          remote-name: "aetherpak-bundle-test"
          pages-url: "http://localhost:9999"
          # skip login for local registry
          registry-token: ""
          upload-pages-artifact: "false"

      - name: Verify the bundle round-tripped into the index
        run: |
          set -euo pipefail
          if [ ! -f "_site/index/static" ]; then
            echo "Error: index/static not generated"
            exit 1
          fi
          REF="$(jq -r '.Results[0].Images[0].Labels["org.flatpak.ref"]' _site/index/static)"
          test "$REF" = "app/org.flatpak.BundleApp/x86_64/stable"

  split-integration-test:
    name: Mock Split Integration Test (oci+site)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Set up aetherpak CLI
        uses: aetherpak/setup-cli@v1
        with:
          version: v0.5.0

      - name: Start Local OCI Registry
        run: |
          docker run -d -p 5001:5000 --name registry registry:2
          for _ in {1..10}; do curl -s http://localhost:5001/v2/ && break; sleep 1; done

      - name: Mock two OSTree repos (AppA, AppB)
        run: |
          set -euo pipefail
          for app in AppA AppB; do
            mkdir -p tests/${app}_repo tests/${app}_contents
            ostree init --mode=archive --repo=tests/${app}_repo
            cat > tests/${app}_contents/metadata <<EOF
          [Application]
          name=org.flatpak.${app}
          runtime=org.freedesktop.Platform/x86_64/23.08
          sdk=org.freedesktop.Sdk/x86_64/23.08
          EOF
            ostree commit --repo=tests/${app}_repo \
              --branch=app/org.flatpak.${app}/x86_64/stable \
              -m "mock ${app} commit" tests/${app}_contents
          done
          # Drop the empty dirs an artifact round-trip loses, exercising publish-oci's heal.
          rm -rf tests/AppA_repo/refs/mirrors tests/AppA_repo/refs/remotes

      - name: Push AppA via publish-oci
        uses: ./publish-oci
        with:
          repo-path: tests/AppA_repo
          registry: localhost:5001
          insecure-registry: "true"
          oci-repository: aetherpak/app-a
          registry-token: ""
          records-dir: _records

      - name: Push AppB via publish-oci
        uses: ./publish-oci
        with:
          repo-path: tests/AppB_repo
          registry: localhost:5001
          insecure-registry: "true"
          oci-repository: aetherpak/app-b
          registry-token: ""
          records-dir: _records

      - name: Build site from both records
        uses: ./publish-site
        with:
          records-dir: _records
          pages-url: http://localhost:9999
          insecure-registry: "true"
          remote-name: aetherpak-split-test
          upload-pages-artifact: "false"

      - name: Verify both apps in the merged index
        run: |
          set -euo pipefail
          NAMES="$(jq -r '.Results[].Name' _site/index/static | sort | tr '\n' ' ')"
          [ "$NAMES" = "aetherpak/app-a aetherpak/app-b " ] || { echo "names mismatch: $NAMES"; exit 1; }
          REFS="$(jq -r '.Results[].Images[].Labels["org.flatpak.ref"]' _site/index/static | sort | tr '\n' ' ')"
          [ "$REFS" = "app/org.flatpak.AppA/x86_64/stable app/org.flatpak.AppB/x86_64/stable " ] \
            || { echo "refs mismatch: $REFS"; exit 1; }
          ls _site/refs/org.flatpak.AppA-stable.flatpakref _site/refs/org.flatpak.AppB-stable.flatpakref

  build-glue-test:
    name: Build action glue (validation + bundle source)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Set up aetherpak CLI
        uses: aetherpak/setup-cli@v1
        with:
          version: v0.5.0

      - name: No source must fail
        id: nosrc
        continue-on-error: true
        uses: ./build
        with:
          repo-path: _r_nosrc
          run-linter: "false"

      - name: Conflicting sources must fail
        id: twosrc
        continue-on-error: true
        uses: ./build
        with:
          manifest-path: apps/m.json
          prebuilt-repo-path: tests/mock_repo
          repo-path: _r_two
          run-linter: "false"

      - name: Assert source validation rejected both
        run: |
          set -euo pipefail
          [ "${{ steps.nosrc.outcome }}" = "failure" ] || { echo "no-source should fail"; exit 1; }
          [ "${{ steps.twosrc.outcome }}" = "failure" ] || { echo "two-source should fail"; exit 1; }

      - name: Build a mock bundle on branch beta
        run: |
          set -euo pipefail
          ostree init --mode=archive --repo=bsrc
          mkdir -p bcontents
          cat > bcontents/metadata <<EOF
          [Application]
          name=org.flatpak.BundleApp
          runtime=org.freedesktop.Platform/x86_64/23.08
          sdk=org.freedesktop.Sdk/x86_64/23.08
          EOF
          ostree commit --repo=bsrc --branch=app/org.flatpak.BundleApp/x86_64/beta -m c bcontents
          flatpak build-bundle bsrc app.flatpak org.flatpak.BundleApp beta

      - name: Build from prebuilt bundle (rebind to stable)
        id: b
        uses: ./build
        with:
          prebuilt-bundle-path: app.flatpak
          branch: stable
          arch: x86_64
          repo-path: _r_bundle
          run-linter: "false"

      - name: Assert bundle-source resolved outputs and rebind
        run: |
          set -euo pipefail
          test "${{ steps.b.outputs.app-id }}" = "org.flatpak.BundleApp" || { echo "app-id: ${{ steps.b.outputs.app-id }}"; exit 1; }
          test "${{ steps.b.outputs.arch }}" = "x86_64" || { echo "arch: ${{ steps.b.outputs.arch }}"; exit 1; }
          test "${{ steps.b.outputs.branch }}" = "stable" || { echo "branch (rebind beta->stable): ${{ steps.b.outputs.branch }}"; exit 1; }

  plan-glue-test:
    name: Plan action glue (force selection + matrix shape)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Set up aetherpak CLI
        uses: aetherpak/setup-cli@v1
        with:
          version: v0.5.0
          install-dependencies: "false"

      - name: Write a mock aetherpak.yaml (manifest + bundle apps)
        run: |
          set -euo pipefail
          mkdir -p apps
          echo '{}' > apps/manifest.json
          cat > aetherpak.yaml <<'EOF'
          registry: ghcr.io
          apps:
            - id: org.example.ManifestApp
              manifest: apps/manifest.json
              runtime: gnome-50
              arches: [x86_64]
            - id: org.example.BundleApp
              branch: stable
              bundles:
                x86_64:
                  url: https://example.com/a.flatpak
                  sha256: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
          EOF

      - name: Plan force=all
        id: all
        uses: ./plan
        with:
          config: aetherpak.yaml
          force: all

      - name: Assert all apps expand with correct source split
        run: |
          set -euo pipefail
          test "${{ steps.all.outputs.count }}" = "2" || { echo "count: ${{ steps.all.outputs.count }}"; exit 1; }
          test "${{ steps.all.outputs.count-manifest }}" = "1" || { echo "count-manifest: ${{ steps.all.outputs.count-manifest }}"; exit 1; }
          test "${{ steps.all.outputs.count-bundle }}" = "1" || { echo "count-bundle: ${{ steps.all.outputs.count-bundle }}"; exit 1; }
          echo '${{ steps.all.outputs.matrix }}' | jq -e 'length == 2' >/dev/null || { echo "matrix length != 2"; exit 1; }

      - name: Plan force=single app
        id: one
        uses: ./plan
        with:
          config: aetherpak.yaml
          force: org.example.BundleApp

      - name: Assert only the named app is selected
        run: |
          set -euo pipefail
          test "${{ steps.one.outputs.count }}" = "1" || { echo "count: ${{ steps.one.outputs.count }}"; exit 1; }
          test "${{ steps.one.outputs.count-bundle }}" = "1" || { echo "count-bundle: ${{ steps.one.outputs.count-bundle }}"; exit 1; }
          test "${{ steps.one.outputs.count-manifest }}" = "0" || { echo "count-manifest should be 0: ${{ steps.one.outputs.count-manifest }}"; exit 1; }

  prep-bundle-glue-test:
    name: Prep-bundle action glue (fetch + verify + rebind)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Set up aetherpak CLI
        uses: aetherpak/setup-cli@v1
        with:
          version: v0.5.0

      - name: Build and serve a bundle on branch beta
        run: |
          set -euo pipefail
          ostree init --mode=archive --repo=psrc
          mkdir -p pcontents
          cat > pcontents/metadata <<EOF
          [Application]
          name=org.flatpak.PrepApp
          runtime=org.freedesktop.Platform/x86_64/23.08
          sdk=org.freedesktop.Sdk/x86_64/23.08
          EOF
          ostree commit --repo=psrc --branch=app/org.flatpak.PrepApp/x86_64/beta -m c pcontents
          mkdir -p srv
          flatpak build-bundle psrc srv/app.flatpak org.flatpak.PrepApp beta
          sha="$(sha256sum srv/app.flatpak | cut -d' ' -f1)"
          echo "BUNDLE_SHA=$sha" >> "$GITHUB_ENV"
          python3 -m http.server 9998 --directory srv & echo "HTTP_PID=$!" >> "$GITHUB_ENV"
          sleep 1

      - name: Prep bundle (rebind beta -> stable)
        uses: ./prep-bundle
        with:
          url: http://localhost:9998/app.flatpak
          sha256: ${{ env.BUNDLE_SHA }}
          branch: stable
          repo-path: _repo_prep

      - name: Verify the imported ref was rebound to stable
        run: |
          set -euo pipefail
          ref="$(ostree refs --repo=_repo_prep | grep '^app/' | head -1)"
          test "$ref" = "app/org.flatpak.PrepApp/x86_64/stable" || { echo "ref: $ref"; exit 1; }

      - name: Stop bundle server
        if: always()
        run: kill "${HTTP_PID:-}" 2>/dev/null || true

  signing-off-and-sanitize-test:
    name: Signing off + remote-name sanitization
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Set up aetherpak CLI
        uses: aetherpak/setup-cli@v1
        with:
          version: v0.5.0

      - name: Start Local OCI Registry
        run: |
          docker run -d -p 5001:5000 --name registry registry:2
          for _ in {1..10}; do curl -s http://localhost:5001/v2/ && break; sleep 1; done

      - name: Create Mock OSTree Repository
        run: |
          mkdir -p tests/mock_repo
          ostree init --mode=archive --repo=tests/mock_repo
          mkdir -p tests/mock_contents
          cat > tests/mock_contents/metadata <<EOF
          [Application]
          name=org.flatpak.MockApp
          runtime=org.freedesktop.Platform/x86_64/23.08
          sdk=org.freedesktop.Sdk/x86_64/23.08
          EOF
          ostree commit --repo=tests/mock_repo --branch=app/org.flatpak.MockApp/x86_64/stable -m "mock app commit" tests/mock_contents

      - name: Generate ephemeral signing key
        run: |
          set -euo pipefail
          GNUPGHOME="$(mktemp -d)"; export GNUPGHOME
          cat > "$GNUPGHOME/params" <<EOF
          %no-protection
          Key-Type: RSA
          Key-Length: 2048
          Name-Real: AetherPak CI
          Name-Email: ci@aetherpak.local
          Expire-Date: 0
          %commit
          EOF
          gpg --batch --gen-key "$GNUPGHOME/params"
          { echo "AEP_GPG_KEY<<EOF"; gpg --armor --export-secret-keys; echo "EOF"; } >> "$GITHUB_ENV"

      - name: Run Build Action
        id: build_step
        uses: ./build
        with:
          prebuilt-repo-path: tests/mock_repo
          repo-path: _repo_test
          run-linter: "false"

      - name: Publish with signing=off despite a key, and a messy remote-name
        uses: ./publish
        with:
          repo-path: ${{ steps.build_step.outputs.repo-path }}
          registry: "localhost:5001"
          insecure-registry: "true"
          oci-repository: "aetherpak/mock-app"
          remote-name: "My Org/Repo"
          pages-url: "http://localhost:9999"
          registry-token: ""
          upload-pages-artifact: "false"
          signing: "off"
          gpg-private-key: ${{ env.AEP_GPG_KEY }}

      - name: Assert off path and sanitized remote-name
        run: |
          set -euo pipefail
          # signing=off must win even when a key is present: signing disabled,
          # no exported key, no signatures.
          if [ "$(jq -r '.enabled' _site/sigs/signing.json)" != "false" ]; then
            echo "signing=off must report enabled=false"; exit 1
          fi
          if [ -f _site/sigs/key.asc ]; then echo "signing=off must not export a key"; exit 1; fi
          if find _site/sigs -type f -name 'signature-*' | grep -q .; then echo "signing=off must not produce signatures"; exit 1; fi
          # "My Org/Repo" sanitizes to my-org-repo for the remote/.flatpakrepo name.
          test -f _site/my-org-repo.flatpakrepo || { echo "sanitized .flatpakrepo missing: $(ls _site/*.flatpakrepo 2>/dev/null)"; exit 1; }
          if grep -q '^GPGKey=' _site/my-org-repo.flatpakrepo; then echo "off .flatpakrepo must not embed GPGKey"; exit 1; fi

  # Real flatpak-builder run in the flathub container — the manifest path the
  # other jobs (prebuilt repo/bundle) never exercise, and where rofiles-fuse
  # fails without the CI auto --disable-rofiles-fuse.
  build-manifest-smoke:
    name: Manifest build smoke (flathub container)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:freedesktop-24.08
      options: --privileged
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Set up aetherpak CLI
        uses: aetherpak/setup-cli@v1
        with:
          version: v0.5.0
          install-dependencies: "false"

      - name: Write a trivial manifest
        run: |
          cat > org.aetherpak.Smoke.json <<'EOF'
          {
            "id": "org.aetherpak.Smoke",
            "runtime": "org.freedesktop.Platform",
            "runtime-version": "24.08",
            "sdk": "org.freedesktop.Sdk",
            "command": "smoke",
            "modules": [
              {
                "name": "smoke",
                "buildsystem": "simple",
                "build-commands": ["mkdir -p /app/bin", "touch /app/bin/smoke"]
              }
            ]
          }
          EOF

      - name: Build the manifest
        id: build
        uses: ./build
        with:
          manifest-path: org.aetherpak.Smoke.json
          arch: x86_64
          branch: stable
          repo-path: _repo_smoke
          run-linter: "false"
          # Mirrors the publish workflows' default; deps already present in the
          # container, so this exercises the passthrough without a real fetch.
          builder-args: "--install-deps-from=flathub"

      - name: Verify the build produced the app ref
        run: |
          set -euo pipefail
          test "${{ steps.build.outputs.app-id }}" = "org.aetherpak.Smoke" || { echo "app-id: ${{ steps.build.outputs.app-id }}"; exit 1; }
          test "${{ steps.build.outputs.branch }}" = "stable" || { echo "branch: ${{ steps.build.outputs.branch }}"; exit 1; }
          test "${{ steps.build.outputs.arch }}" = "x86_64" || { echo "arch: ${{ steps.build.outputs.arch }}"; exit 1; }
          ostree refs --repo=_repo_smoke | grep -qx 'app/org.aetherpak.Smoke/x86_64/stable' \
            || { echo "expected ref missing:"; ostree refs --repo=_repo_smoke; exit 1; }
