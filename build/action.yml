name: "AetherPak Build/Import"
description: "Compile a Flatpak app from a manifest, or import a pre-built bundle or OSTree repository."

inputs:
  manifest-path:
    description: "Path to the Flatpak manifest (JSON/YAML) within the checked-out sources."
    required: false
    default: ""
  prebuilt-bundle-path:
    description: "Path to a pre-built .flatpak bundle file."
    required: false
    default: ""
  prebuilt-repo-path:
    description: "Path to an existing OSTree repository directory."
    required: false
    default: ""
  app-id:
    description: "Reverse-DNS app id (fallback if not building/resolving from repository)."
    required: false
    default: ""
  branch:
    description: "Flatpak branch (channel). When unset: 'stable' on tag pushes, 'beta' on the default branch, else the git ref name."
    required: false
    default: ""
  arch:
    description: "Target CPU architecture (default: x86_64)."
    required: false
    default: "x86_64"
  run-linter:
    description: "Whether to run flatpak-builder-lint verification (default: true)."
    required: false
    default: "true"
  cache:
    description: "Enable flatpak-builder caching for manifest builds (default: true)."
    required: false
    default: "true"
  repo-path:
    description: "Target path to export or store the OSTree repository."
    required: false
    default: "_repo"
  builder-args:
    description: "Extra flatpak-builder flags for manifest builds, one per line (e.g. --install-deps-from=flathub). Ignored for bundle/repo imports."
    required: false
    default: ""

outputs:
  repo-path:
    description: "Path to the OSTree repository containing the application."
    value: ${{ steps.resolve.outputs.repo-path }}
  app-id:
    description: "Resolved Reverse-DNS Application ID."
    value: ${{ steps.resolve.outputs.app-id }}
  branch:
    description: "Resolved Flatpak branch."
    value: ${{ steps.resolve.outputs.branch }}
  arch:
    description: "Resolved application architecture."
    value: ${{ steps.resolve.outputs.arch }}

runs:
  using: "composite"
  steps:
    - name: Validate Inputs
      shell: bash
      run: |
        set -euo pipefail
        SRC_COUNT=0
        if [ -n "${{ inputs.manifest-path }}" ]; then SRC_COUNT=$((SRC_COUNT + 1)); fi
        if [ -n "${{ inputs.prebuilt-bundle-path }}" ]; then SRC_COUNT=$((SRC_COUNT + 1)); fi
        if [ -n "${{ inputs.prebuilt-repo-path }}" ]; then SRC_COUNT=$((SRC_COUNT + 1)); fi

        if [ $SRC_COUNT -eq 0 ]; then
          echo "::error::You must provide at least one of: manifest-path, prebuilt-bundle-path, or prebuilt-repo-path."
          exit 1
        elif [ $SRC_COUNT -gt 1 ]; then
          echo "::error::Conflicting inputs. Provide only ONE of: manifest-path, prebuilt-bundle-path, or prebuilt-repo-path."
          exit 1
        fi

    - name: Require aetherpak CLI
      shell: bash
      run: command -v aetherpak >/dev/null || { echo "::error::aetherpak CLI not on PATH"; exit 1; }

    - name: Resolve channel
      id: channel
      shell: bash
      env:
        INPUT_BRANCH: ${{ inputs.branch }}
        GITHUB_REF_TYPE: ${{ github.ref_type }}
        GITHUB_REF_NAME: ${{ github.ref_name }}
        DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
      run: |
        set -euo pipefail
        if [ -n "$INPUT_BRANCH" ]; then
          name="$INPUT_BRANCH"
        else
          name="$(aetherpak resolve-channel)"
        fi
        echo "name=${name}" >> "$GITHUB_OUTPUT"

    - name: Cache build state
      if: ${{ inputs.manifest-path != '' && inputs.cache == 'true' }}
      uses: actions/cache@v4
      with:
        path: |
          .state
          .ccache
        key: aetherpak-flatpak-${{ inputs.arch }}-${{ hashFiles(inputs.manifest-path) }}
        restore-keys: aetherpak-flatpak-${{ inputs.arch }}-

    - name: Build from manifest
      if: ${{ inputs.manifest-path != '' }}
      shell: bash
      env:
        APP_ID: ${{ inputs.app-id }}
        MANIFEST: ${{ inputs.manifest-path }}
        ARCH: ${{ inputs.arch }}
        BRANCH: ${{ steps.channel.outputs.name }}
        REPO: ${{ inputs.repo-path }}
        RUN_LINTER: ${{ inputs.run-linter }}
        BUILDER_ARGS: ${{ inputs.builder-args }}
      run: |
        set -euo pipefail
        ARGS=(--manifest "$MANIFEST" --arch "$ARCH" --branch "$BRANCH" --repo-path "$REPO")
        [ -n "$APP_ID" ] && ARGS+=(--app "$APP_ID")
        [ "$RUN_LINTER" = "true" ] && ARGS+=(--run-linter)
        while IFS= read -r arg; do
          [ -n "$arg" ] && ARGS+=(--builder-arg "$arg")
        done <<< "$BUILDER_ARGS"
        aetherpak build "${ARGS[@]}"

    - name: Import pre-built bundle
      if: ${{ inputs.prebuilt-bundle-path != '' }}
      shell: bash
      env:
        BUNDLE: ${{ inputs.prebuilt-bundle-path }}
        ARCH: ${{ inputs.arch }}
        BRANCH: ${{ steps.channel.outputs.name }}
        REPO: ${{ inputs.repo-path }}
      run: |
        set -euo pipefail
        aetherpak import --bundle-path "$BUNDLE" --arch "$ARCH" --branch "$BRANCH" --repo-path "$REPO"

    - name: Copy pre-built OSTree repository
      if: ${{ inputs.prebuilt-repo-path != '' }}
      shell: bash
      env:
        SRC: ${{ inputs.prebuilt-repo-path }}
        DST: ${{ inputs.repo-path }}
      run: |
        set -euo pipefail
        if [ "$SRC" != "$DST" ]; then
          mkdir -p "$DST"
          cp -al "$SRC"/. "$DST"/
        fi

    - name: Resolve app info
      id: resolve
      shell: bash
      env:
        REPO: ${{ inputs.repo-path }}
      run: |
        set -euo pipefail
        aetherpak inspect-repo --repo-path "$REPO" --output-file "$GITHUB_OUTPUT"

    # Manifest builds lint via `aetherpak build --run-linter`; other sources have
    # no manifest, so lint the resulting repo here when requested.
    - name: Lint imported repository
      if: ${{ inputs.run-linter == 'true' && inputs.manifest-path == '' }}
      shell: bash
      env:
        REPO: ${{ inputs.repo-path }}
      run: |
        set -euo pipefail
        flatpak-builder-lint repo "$REPO"
